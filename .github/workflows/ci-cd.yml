name: CI-CD Pipeline

on:
  pull_request:
    branches:
      - main
    push:
      branches:
      - main

jobs:

  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Check backend app
        run: |
          cd backend
          python -c "import app"

      - name: Run backend tests
        run: |
              cd backend
              pytest
        env:
              GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
              DATABASE_URL: ${{ secrets.DATABASE_URL }}
              PYTHONPATH: ${{ github.workspace }}/backend

  frontend:
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install frontend dependencies
        run: |
          cd frontend
          pip install -r requirements.txt

      - name: Check frontend app
        run: |
          cd frontend
          python -c "import app"

      - name: Run frontend tests
        run: |
              cd frontend
              pip install pytest
              pytest
